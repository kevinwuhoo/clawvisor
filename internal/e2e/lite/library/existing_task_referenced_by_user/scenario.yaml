id: existing_task_referenced_by_user
description: |
  Same shape as existing_standing_task_reuse, but the trigger for
  discovery isn't recurring-activity phrasing — it's an explicit
  reference to prior work. The user says "keep going with the
  release-notes draft from yesterday", which is the second trigger
  case the new control-notice paragraph calls out. The harness seeds
  one active sliding task whose purpose matches that draft, so the
  agent should recognize the reference, GET /control/tasks to
  confirm, and resume work under the existing scope.

  Failure modes this scenario catches:
    - Agent treats "keep going" as new work and opens a fresh task,
      forcing an extra approval the user already gave.
    - Agent never lists tasks, just guesses or asks the user for the
      draft path — the discovery counter stays at zero.

agent:
  name: existing-task-referenced-by-user-agent

preseeded_tasks:
  - purpose: "Draft release notes for v0.9 in workspace/release-notes/v0.9.md."
    lifetime: sliding
    schema_version: 2
    expected_tools:
      - tool_name: Read
        why: "Read existing release-notes scaffolding to extend it."
      - tool_name: Edit
        why: "Append sections to the in-progress draft."
      - tool_name: Bash
        why: "ls / cat to confirm the draft state between edits."

setup_shell: |
  mkdir -p workspace/release-notes
  cat > workspace/release-notes/v0.9.md <<'EOF'
  # v0.9 release notes (in progress)

  ## Highlights

  - TODO

  ## Fixes

  - TODO
  EOF

script:
  - say: |
      Keep going with the release-notes draft from yesterday — fill in
      one bullet under Highlights and one under Fixes. Anything
      plausible; this is just to push the draft forward.
    approval_floor: 0

approvals:
  policy: scripted
  default: deny
  rules:
    - match:
        kind: task_create
      resolution: allow_session

budget:
  max_turns_per_step: 12
  max_tool_calls_total: 20
  wall_clock_seconds: 240

expectations:
  hard:
    # No new task / approval — the seeded sliding task covers it.
    # control.tasks_listed is intentionally NOT asserted: the ACTIVE
    # TASKS snapshot in the system prompt may make the listing
    # round-trip unnecessary. The load-bearing signal is "the agent
    # did the work without triggering a new approval."
    - count:
        series: approvals.allow_session
        eq: 0
    - count:
        series: task_creates.lifetime_sliding
        eq: 0
    - count:
        series: task_creates.lifetime_session
        eq: 0
    - count:
        series: task_creates.lifetime_standing
        eq: 0
    - count:
        series: lite_proxy.tool_use.block
        eq: 0
  soft:
    - "Agent resolved 'keep going with the release-notes draft from yesterday' by GETting /api/control/tasks, picking the seeded v0.9 sliding task, and editing workspace/release-notes/v0.9.md under that scope — no fresh POST /control/tasks, no extra approval."
