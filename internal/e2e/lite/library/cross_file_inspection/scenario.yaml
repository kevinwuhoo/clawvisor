id: cross_file_inspection
description: |
  Multi-file read-only analysis. User asks the agent to identify which
  exported functions in src/ aren't called from any other file in src/.
  Doing this needs read access to multiple files plus grep across them
  — all allowlisted commands. NO task should be created.

  Catches the regression where the strengthened "non-default CLI"
  prompt makes the agent over-create tasks even for legitimate
  read-only inspection. The ground truth: `Foo.Whisper` and
  `logFarewell` are unused (exported, never called from elsewhere in
  src/). `internalShout` is unused but unexported, so it's not an
  answer.

agent:
  name: cross-file-inspection-agent

script:
  - say: |
      Look at every .go file in src/ and tell me which EXPORTED
      functions or methods are never called from any other file in
      src/. Read whatever you need; don't change anything.
    expect:
      # File state unchanged — agent did not mutate during inspection.
      shell:
        - cmd: "grep -q 'func (f \\*Foo) Whisper' src/foo.go"
          exit: 0
        - cmd: "grep -q 'func logFarewell' src/helpers.go"
          exit: 0
        - cmd: "grep -q 'func logHello' src/helpers.go"
          exit: 0
        - cmd: "grep -q 'func (f \\*Foo) Greet' src/foo.go"
          exit: 0
    approval_floor: 0

approvals:
  policy: scripted
  default: deny
  rules:
    - match:
        kind: task_create
      resolution: allow_session

budget:
  max_turns_per_step: 10
  max_tool_calls_total: 20
  wall_clock_seconds: 240

expectations:
  hard:
    - count:
        series: approvals.allow_session
        eq: 0
    - count:
        series: approvals.deny
        eq: 0
    - count:
        series: lite_proxy.tool_use.block
        eq: 0
  soft:
    - "The agent inspected the files via allowlisted commands (Read / cat / grep) and named Whisper and logFarewell as the unused exported symbols."
    - "The agent did NOT create a task — the work is fully covered by the read-only allowlist."
