service:
  id: linear
  display_name: Linear
  description: "Create and track issues, manage projects and cycles, and coordinate work across your Linear workspace."
  setup_url: "https://linear.app/settings/api"
  key_hint: "Linear API key (lin_api_...)"
  icon_url: "/logos/linear.svg"
  identity:
    endpoint: "/"
    method: POST
    body: '{"query": "{ viewer { email } }"}'
    field: "data.viewer.email"

auth:
  type: api_key
  header: "Authorization"
  header_prefix: "Bearer "
  extra_headers:
    Content-Type: "application/json"
  pkce_flow:
    client_id: "3320c87d639e6a40979d884f3ac96c2a"
    client_id_env: "LINEAR_CLIENT_ID"
    scopes: ["read", "write"]
    authorize_url: "https://linear.app/oauth/authorize"
    token_url: "https://api.linear.app/oauth/token"
    localhost_redirect: true

api:
  base_url: "https://api.linear.app/graphql"
  type: graphql

actions:
  list_issues:
    display_name: "List issues"
    risk: { category: read, sensitivity: low, description: "List Linear issues" }
    query: |
      query($first: Int!, $after: String, $filter: IssueFilter) {
        issues(first: $first, after: $after, filter: $filter) {
          nodes {
            id identifier title
            state { name }
            priority
            assignee { name }
            team { name key }
            createdAt url
          }
          pageInfo { hasNextPage endCursor }
        }
      }
    params:
      first: { type: int, default: 50, max: 250, graphql_var: true }
      after: { type: string, graphql_var: true }
      team_id: { type: string, filter_path: "team.id.eq" }
      state: { type: string, filter_path: "state.name.eq" }
      assignee_id: { type: string, filter_path: "assignee.id.eq" }
      assignee_is_me: { type: bool, filter_path: "assignee.isMe.eq" }
    response:
      data_path: "data.issues.nodes"
      fields:
        - { name: id }
        - { name: identifier }
        - { name: title, sanitize: true }
        - { name: state, path: "state.name" }
        - { name: priority }
        - { name: assignee, path: "assignee.name", nullable: true }
        - { name: team, path: "team.name" }
        - { name: createdAt, rename: created_at }
        - { name: url }
      meta:
        - { name: data.issues.pageInfo.hasNextPage, rename: has_more }
        - { name: data.issues.pageInfo.endCursor, rename: end_cursor }
      summary: "{{len .Data}} issue(s)"

  get_issue:
    display_name: "Get issue"
    risk: { category: read, sensitivity: low, description: "Read a specific Linear issue" }
    query: |
      query($id: String!) {
        issue(id: $id) {
          id identifier title description
          state { name }
          priority
          assignee { name }
          team { name key }
          project { name }
          createdAt url
        }
      }
    params:
      issue_id: { type: string, required: true, graphql_var: true, map_to: "id" }
    response:
      data_path: "data.issue"
      fields:
        - { name: id }
        - { name: identifier }
        - { name: title, sanitize: true }
        - { name: description, sanitize: true }
        - { name: state, path: "state.name" }
        - { name: priority }
        - { name: assignee, path: "assignee.name", nullable: true }
        - { name: team, path: "team.name" }
        - { name: project, path: "project.name", nullable: true }
        - { name: createdAt, rename: created_at }
        - { name: url }
      summary: "{{.identifier}}: {{.title}} [{{.state}}]"

  create_issue:
    display_name: "Create issue"
    risk: { category: write, sensitivity: medium, description: "Create a Linear issue" }
    mutation: true
    query: |
      mutation($input: IssueCreateInput!) {
        issueCreate(input: $input) {
          success
          issue { id identifier title url }
        }
      }
    params:
      title: { type: string, required: true, input_field: "title" }
      team_id: { type: string, required: true, input_field: "teamId" }
      description: { type: string, input_field: "description" }
      priority: { type: int, input_field: "priority" }
      assignee_id: { type: string, input_field: "assigneeId" }
      state_id: { type: string, input_field: "stateId" }
    response:
      data_path: "data.issueCreate.issue"
      fields:
        - { name: id }
        - { name: identifier }
        - { name: title }
        - { name: url }
      summary: "Created {{.identifier}}: {{.title}}"

  update_issue:
    display_name: "Update issue"
    risk: { category: write, sensitivity: medium, description: "Update a Linear issue" }
    mutation: true
    query: |
      mutation($id: String!, $input: IssueUpdateInput!) {
        issueUpdate(id: $id, input: $input) {
          success
          issue { id identifier title url }
        }
      }
    params:
      issue_id: { type: string, required: true, graphql_var: true, map_to: "id" }
      title: { type: string, input_field: "title" }
      description: { type: string, input_field: "description" }
      state_id: { type: string, input_field: "stateId" }
      priority: { type: int, input_field: "priority" }
      assignee_id: { type: string, input_field: "assigneeId" }
    response:
      data_path: "data.issueUpdate.issue"
      fields:
        - { name: id }
        - { name: identifier }
        - { name: title }
        - { name: url }
      summary: "Updated {{.identifier}}: {{.title}}"

  add_comment:
    display_name: "Add comment"
    risk: { category: write, sensitivity: medium, description: "Add a comment to a Linear issue" }
    mutation: true
    query: |
      mutation($input: CommentCreateInput!) {
        commentCreate(input: $input) {
          success
          comment { id url }
        }
      }
    params:
      issue_id: { type: string, required: true, input_field: "issueId" }
      body: { type: string, required: true, input_field: "body" }
    response:
      data_path: "data.commentCreate.comment"
      fields:
        - { name: id }
        - { name: url }
      summary: "Added comment to issue"

  list_teams:
    display_name: "List teams"
    risk: { category: read, sensitivity: low, description: "List Linear teams" }
    query: |
      query($first: Int!, $after: String) {
        teams(first: $first, after: $after) {
          nodes { id name key }
          pageInfo { hasNextPage endCursor }
        }
      }
    params:
      first: { type: int, default: 50, max: 250, graphql_var: true }
      after: { type: string, graphql_var: true }
    response:
      data_path: "data.teams.nodes"
      fields:
        - { name: id }
        - { name: name }
        - { name: key }
      meta:
        - { name: data.teams.pageInfo.hasNextPage, rename: has_more }
        - { name: data.teams.pageInfo.endCursor, rename: end_cursor }
      summary: "{{len .Data}} team(s)"

  list_projects:
    display_name: "List projects"
    risk: { category: read, sensitivity: low, description: "List Linear projects" }
    query: |
      query($first: Int!, $after: String) {
        projects(first: $first, after: $after) {
          nodes { id name state startDate targetDate url }
          pageInfo { hasNextPage endCursor }
        }
      }
    params:
      first: { type: int, default: 50, max: 250, graphql_var: true }
      after: { type: string, graphql_var: true }
    response:
      data_path: "data.projects.nodes"
      fields:
        - { name: id }
        - { name: name, sanitize: true }
        - { name: state }
        - { name: startDate, rename: start_date }
        - { name: targetDate, rename: target_date }
        - { name: url }
      meta:
        - { name: data.projects.pageInfo.hasNextPage, rename: has_more }
        - { name: data.projects.pageInfo.endCursor, rename: end_cursor }
      summary: "{{len .Data}} project(s)"

  search_issues:
    display_name: "Search issues"
    risk: { category: search, sensitivity: low, description: "Search Linear issues" }
    query: |
      query($query: String!, $first: Int, $after: String, $includeComments: Boolean, $filter: IssueFilter) {
        searchIssues(term: $query, first: $first, after: $after, includeComments: $includeComments, filter: $filter) {
          nodes {
            id identifier title
            state { name }
            priority
            assignee { name }
            team { name key }
            url
          }
          pageInfo { hasNextPage endCursor }
        }
      }
    params:
      query: { type: string, required: true, graphql_var: true }
      first: { type: int, default: 20, max: 250, graphql_var: true }
      after: { type: string, graphql_var: true }
      includeComments: { type: bool, default: true, graphql_var: true }
      team_id: { type: string, filter_path: "team.id.eq" }
      state: { type: string, filter_path: "state.name.eq" }
      assignee_id: { type: string, filter_path: "assignee.id.eq" }
      assignee_is_me: { type: bool, filter_path: "assignee.isMe.eq" }
    response:
      data_path: "data.searchIssues.nodes"
      fields:
        - { name: id }
        - { name: identifier }
        - { name: title, sanitize: true }
        - { name: state, path: "state.name" }
        - { name: priority }
        - { name: assignee, path: "assignee.name", nullable: true }
        - { name: team, path: "team.name" }
        - { name: url }
      meta:
        - { name: data.searchIssues.pageInfo.hasNextPage, rename: has_more }
        - { name: data.searchIssues.pageInfo.endCursor, rename: end_cursor }
      summary: "{{len .Data}} result(s)"
