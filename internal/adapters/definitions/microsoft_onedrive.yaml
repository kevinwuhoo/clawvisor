service:
  id: microsoft.onedrive
  display_name: OneDrive
  description: "List, search, upload, and download files in Microsoft OneDrive."
  setup_url: "https://learn.microsoft.com/en-us/graph/auth-register-app-v2"
  icon_url: "/logos/microsoft-onedrive.svg"
  identity:
    endpoint: "https://graph.microsoft.com/v1.0/me"
    field: "userPrincipalName"

auth:
  type: oauth2
  oauth:
    scopes:
      - "Files.ReadWrite"
      - "User.Read"
      - "offline_access"
    endpoint: microsoft
    vault_key: microsoft
    scope_merge: true
    authorize_url: "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
    token_url: "https://login.microsoftonline.com/common/oauth2/v2.0/token"

api:
  base_url: "https://graph.microsoft.com/v1.0"
  type: rest

verification_hints: |
  OneDrive actions operate on the user's personal or organizational file storage.
  File paths use /me/drive/root:/path: syntax. Item IDs are also accepted.
  Destructive operations (delete, move) are permanent.

actions:
  list_files:
    display_name: "List files"
    risk: { category: read, sensitivity: low, description: "List files in a OneDrive folder" }
    scopes: ["Files.ReadWrite"]
    method: GET
    path: "/me/drive/root/children"
    params:
      folder_path:
        type: string
        description: "Folder path (leave empty for root). If provided, path changes to /me/drive/root:/path:/children"
      top:
        type: int
        default: 25
        max: 200
        location: query
        map_to: "$top"
      select:
        type: string
        location: query
        map_to: "$select"
        default: "id,name,size,lastModifiedDateTime,folder,file"
    # NOTE: Needs Go override to handle dynamic path construction
    override: go

  get_file:
    display_name: "Get file metadata"
    risk: { category: read, sensitivity: low, description: "Get metadata for a file or folder in OneDrive" }
    scopes: ["Files.ReadWrite"]
    method: GET
    path: "/me/drive/items/{{.item_id}}"
    params:
      item_id:
        type: string
        required: true
        location: path
    response:
      fields:
        - { name: id }
        - { name: name }
        - { name: size }
        - { name: lastModifiedDateTime, rename: modified }
        - { name: webUrl, rename: web_url }
        - { name: parentReference.path, rename: path }
      summary: "{{.name}}"

    errors:
      - { code: not_found, status: 404 }
      - { code: not_found, status: 400, body: "item id is not valid" }

  download_file:
    display_name: "Download file"
    risk: { category: read, sensitivity: low, description: "Download a file's content from OneDrive" }
    scopes: ["Files.ReadWrite"]
    override: go
    params:
      item_id:
        type: string
        required: true
        description: "OneDrive item ID"

  upload_file:
    display_name: "Upload file"
    risk: { category: write, sensitivity: medium, description: "Upload a file to OneDrive" }
    scopes: ["Files.ReadWrite"]
    override: go
    params:
      path:
        type: string
        required: true
        description: "Destination path in OneDrive (e.g. /Documents/report.txt)"
      content:
        type: string
        required: true
        description: "File content to upload"

  search_files:
    display_name: "Search files"
    risk: { category: search, sensitivity: low, description: "Search for files in OneDrive" }
    scopes: ["Files.ReadWrite"]
    method: GET
    path: "/me/drive/root/search(q='{{.query}}')"
    params:
      query:
        type: string
        required: true
        location: path
      top:
        type: int
        default: 25
        max: 200
        location: query
        map_to: "$top"
    response:
      data_path: "value"
      fields:
        - { name: id }
        - { name: name }
        - { name: size }
        - { name: webUrl, rename: web_url }
        - { name: lastModifiedDateTime, rename: modified }
      summary: "{{len .Data}} result(s)"
